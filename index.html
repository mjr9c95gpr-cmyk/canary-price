<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЦПА | Прайс-лист</title>
    <style>
        :root {
            --bg-color: #0d0d11;
            --card-bg: #16161f;
            --accent-color: #d4af37;
            --text-main: #ffffff;
            --text-muted: #a0a0ab;
            --border-color: #232330;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background-color: var(--card-bg);
            border-radius: 24px;
            padding: 35px 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .header img {
            width: 90px;
            height: 90px;
            margin-bottom: 15px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent-color);
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .price-section {
            text-align: left;
            margin-bottom: 25px;
        }

        .price-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .price-item:last-child {
            border-bottom: none;
        }

        .item-info .item-name {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 2px;
        }

        .item-info .item-desc {
            font-size: 12px;
            color: var(--text-muted);
        }

        .item-price {
            font-size: 16px;
            font-weight: 600;
            color: var(--accent-color);
            white-space: nowrap;
            margin-left: 15px;
        }

        .footer {
            margin-top: 15px;
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        @media (max-width: 400px) {
            .container {
                padding: 25px 16px;
            }
        }
    </style>
</head>
